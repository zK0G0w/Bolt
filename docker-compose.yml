# ====================================================
# Bolt 本地开发环境
# 启动全部：docker compose up -d
# 仅基础设施：docker compose up -d redis
# 仅应用调试：本地 mvn spring-boot:run
# ====================================================

services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123456}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123456}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  bolt:
    build: .
    ports:
      - "9292:9292"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123456}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
