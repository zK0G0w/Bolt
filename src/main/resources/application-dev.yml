# ====================================================
# Bolt RTB Engine - 开发环境
# ====================================================

spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:redis123456}
      database: 10
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 2
          max-wait: 1000

bolt:
  cache:
    invalidation-channel: bolt:cache:invalidate

management:
  endpoint:
    health:
      show-details: always
